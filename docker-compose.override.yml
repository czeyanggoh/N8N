services:
  playwright:
    build: /opt/dbs-automation/playwright
    container_name: dbs-playwright
    restart: unless-stopped
    env_file:
      - /opt/dbs-automation/playwright/.env
    expose:
      - "3000"
    volumes:
      - playwright_state:/app/state
      - playwright_uploads:/app/uploads
      - playwright_shots:/app/screenshots
      - /opt/dbs-automation/config:/repo/config:ro
    shm_size: "2gb"
    networks:
      - default

  deploy-proxy:
    image: nginx:alpine
    container_name: dbs-deploy-proxy
    restart: unless-stopped
    volumes:
      - /opt/dbs-automation/deploy-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.deploy.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/__deploy`)"
      - traefik.http.routers.deploy.entrypoints=websecure
      - traefik.http.routers.deploy.tls=true
      - traefik.http.routers.deploy.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.deploy-strip.stripprefix.prefixes=/__deploy
      - traefik.http.routers.deploy.middlewares=deploy-strip@docker
      - traefik.http.services.deploy.loadbalancer.server.port=80
    networks:
      - default

  n8n:
    depends_on:
      - playwright
      - deploy-proxy

volumes:
  playwright_state:
  playwright_uploads:
  playwright_shots:
